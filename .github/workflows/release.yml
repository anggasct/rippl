name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          package-name: rippl
          # Start changelog from last main commit before CAP-910 launch polish.
          bootstrap-sha: ea46b8ea26269a315cf8cd736819e0315724bcb4
